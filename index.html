<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Simulador de Sueldo Neto</title>
</head>
<body>

  <div id="app">
    <h1>Simulador de Sueldo Neto 2026</h1>

    <input type="number" id="salarioBruto" placeholder="Salario Bruto Anual (€)">

    <button id="btnCalcular">Calcular Retención</button>

    <div id="resultado" class="hidden">
      <p>Tu sueldo neto mensual es: <span id="montoNeto">0</span> €</p>
      <p>Retención aplicada: <span id="porcentaje">0</span> %</p>
    </div>
  </div>

  <script src="script.js"></script>

</body>
</html>
